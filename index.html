<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSET TRACKER // NOMO</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07080f;
      --bg-card:      #0d1020;
      --bg-input:     #0a0c1c;
      --accent:       #00e5ff;
      --accent-dim:   rgba(0, 229, 255, 0.08);
      --accent-glow:  rgba(0, 229, 255, 0.18);
      --accent-border:rgba(0, 229, 255, 0.28);
      --purple:       #8b5cf6;
      --green:        #10b981;
      --amber:        #f59e0b;
      --red:          #ef4444;
      --text:         #f1f5f9;
      --text-muted:   #90adc4;   /* 原 #64748b，大幅提亮 */
      --text-dim:     #b8ccda;   /* 原 #94a3b8，提亮 */
      --border:       rgba(255, 255, 255, 0.10);
      --mono:         'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,229,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .logo em { color: var(--text-muted); font-style: normal; font-weight: 300; }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hdate {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .logout-btn:hover {
      color: var(--red);
      border-color: rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.08);
    }

    /* ── HERO ───────────────────────────────────── */
    .hero {
      background: var(--bg-card);
      border: 1px solid var(--accent-border);
      border-radius: 18px;
      padding: 28px 28px 26px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(0,229,255,0.07), transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-total {
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 48px rgba(0,229,255,0.28);
      transition: color 0.3s;
    }
    .hero-change {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 24px;
      min-height: 20px;
    }
    .hero-change.pos { color: var(--green); }
    .hero-change.neg { color: var(--red); }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .bd-item {
      background: rgba(7, 8, 15, 0.85);
      padding: 14px 16px;
    }
    .bd-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .bd-val {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .bd-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── RATE BAR ───────────────────────────────── */
    .rate-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .rate-lbl {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .rate-eq {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .rate-bar input {
      width: 120px;
    }

    /* ── ACCOUNT GROUP ──────────────────────────── */
    .grp {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 20px;
      margin-bottom: 10px;
    }
    .grp-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .grp-title {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .grp-sum {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dim);
      transition: color 0.2s;
    }

    .accs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    .acc {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .acc-name {
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 500;
    }
    .inp-wrap {
      position: relative;
    }
    .inp-pfx {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
      letter-spacing: 0;
    }
    input[type="number"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 12px 13px 36px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;       /* 16px 防止 iOS 自動縮放 */
      font-weight: 500;
      outline: none;
      -moz-appearance: textfield;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: rgba(0,229,255,0.6);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }
    .ntd-pfx { padding-left: 52px; }
    .pfx-ntd { font-size: 12px; letter-spacing: 0; }

    .acc-conv {
      font-size: 13px;
      color: var(--text-muted);
      padding-left: 2px;
      min-height: 18px;
    }

    /* ── RECORD BUTTON ──────────────────────────── */
    .rec-btn {
      width: 100%;
      margin-top: 14px;
      padding: 18px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .rec-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .rec-btn:hover { box-shadow: 0 0 24px var(--accent-glow); }
    .rec-btn:hover::before { opacity: 0.06; }
    .rec-btn:active::before { opacity: 0.15; }
    .rec-btn span { position: relative; z-index: 1; }

    /* ── SECTION TITLE ──────────────────────────── */
    .sec-title {
      font-size: 12px;
      letter-spacing: 0.32em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sec-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── CHART ──────────────────────────────────── */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 20px;
      margin-top: 24px;
      margin-bottom: 24px;
    }
    .chart-box {
      position: relative;
      height: 240px;
    }
    .chart-empty {
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    /* ── HISTORY ────────────────────────────────── */
    .hist-empty {
      text-align: center;
      padding: 36px;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 0.08em;
    }
    table.htbl {
      width: 100%;
      border-collapse: collapse;
    }
    .htbl th {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      text-transform: uppercase;
    }
    .htbl td {
      font-size: 14px;
      padding: 15px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-dim);
    }
    .htbl tr:hover td { background: rgba(255,255,255,0.02); }
    .htbl .td-tot { color: var(--text); font-weight: 600; }
    .td-chg.pos { color: var(--green); }
    .td-chg.neg { color: var(--red); }
    .del-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: all 0.14s;
      opacity: 0.6;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn:hover { color: var(--red); background: rgba(239,68,68,0.12); opacity: 1; }

    /* ── PORTFOLIO RING ─────────────────────────── */
    .alloc-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }
    .ring-wrap { position: relative; width: 84px; height: 84px; flex-shrink: 0; }
    #ringCanvas { display: block; }
    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .ring-label-val { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }
    .alloc-legend { display: flex; flex-direction: column; gap: 10px; }
    .al-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .al-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .al-name { color: var(--text-muted); min-width: 32px; }
    .al-pct { color: var(--text); font-weight: 600; min-width: 42px; }
    .al-amt { color: var(--text-dim); font-size: 12px; }

    /* ── TOAST ──────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--bg-card);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.14em;
      padding: 12px 24px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.28s, transform 0.28s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ─────────────────────────────────── */
    @media (max-width: 640px) {
      .wrap { padding: 20px 14px 80px; }
      header { margin-bottom: 20px; }
      .logo { font-size: 12px; letter-spacing: 0.2em; }
      .hdate { font-size: 12px; }
      .hero { padding: 22px 18px 20px; }
      .hero-total { font-size: 38px; }
      .hero-change { font-size: 13px; }
      .breakdown { grid-template-columns: 1fr; }
      .bd-item { padding: 12px 16px; }
      .bd-val { font-size: 18px; }
      .accs { grid-template-columns: 1fr; }
      .grp { padding: 18px 16px; }
      .grp-title { font-size: 12px; }
      .acc-name { font-size: 15px; }
      input[type="number"] { font-size: 16px; padding: 14px 12px 14px 38px; }
      .rec-btn { font-size: 13px; padding: 17px; }
      .htbl th { font-size: 11px; padding: 9px 10px; }
      .htbl td { font-size: 13px; padding: 13px 10px; }
      .chart-card { padding: 18px 14px 14px; }
      .alloc-wrap { flex-direction: row; }
    }

    /* ── PIN LOCK ───────────────────────────────── */
    #pin-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
    }
    #pin-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,229,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    #pin-screen h2 {
      position: relative;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
    }
    #pin-input {
      position: relative;
      width: 180px;
      text-align: center;
      padding: 14px;
      font-size: 26px;
      letter-spacing: 0.4em;
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text);
      outline: none;
      font-family: var(--mono);
    }
    #pin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
    #pin-error {
      position: relative;
      color: var(--red);
      font-size: 13px;
      letter-spacing: 0.05em;
      min-height: 18px;
      font-family: var(--mono);
    }
    #pin-btn {
      position: relative;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--mono);
      transition: box-shadow 0.2s;
    }
    #pin-btn:hover { box-shadow: 0 0 20px var(--accent-glow); }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <h2>🔒 ASSET TRACKER</h2>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="10" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()">
  <div id="pin-error"></div>
  <button id="pin-btn" onclick="checkPin()">確認</button>
</div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">NOMO <em>//</em> ASSET TRACKER</div>
    <div class="hdr-right">
      <div class="hdate" id="hdate"></div>
      <button class="logout-btn" onclick="logout()" title="登出">⏻</button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">Total Net Worth</div>
    <div class="hero-total" id="heroTotal">NT$ —</div>
    <div class="hero-change" id="heroChange"></div>

    <div class="breakdown">
      <div class="bd-item">
        <div class="bd-label">🇺🇸 美股</div>
        <div class="bd-val" id="bdUs">—</div>
        <div class="bd-sub" id="bdUsSub"></div>
      </div>
      <div class="bd-item">
        <div class="bd-label">🇹🇼 台股</div>
        <div class="bd-val" id="bdTw">—</div>
        <div class="bd-sub">TWD</div>
      </div>
      <div class="bd-item">
        <div class="bd-label">💰 現金</div>
        <div class="bd-val" id="bdCash">—</div>
        <div class="bd-sub">TWD</div>
      </div>
    </div>

    <!-- Mini allocation ring inside hero -->
    <div class="alloc-wrap" id="allocWrap" style="display:none">
      <div class="ring-wrap">
        <canvas id="ringCanvas" width="88" height="88"></canvas>
        <div class="ring-label"><span class="ring-label-val">配置</span></div>
      </div>
      <div class="alloc-legend" id="allocLegend"></div>
    </div>
  </div>

  <!-- EXCHANGE RATE -->
  <div class="rate-bar">
    <div class="rate-lbl">USD / TWD</div>
    <div class="inp-wrap" style="position:relative">
      <span class="inp-pfx">$</span>
      <input type="number" id="rate" value="32.50" step="0.01" min="1" style="width:110px">
    </div>
    <div class="rate-eq">= 1 USD</div>
  </div>

  <!-- US STOCKS -->
  <div class="grp">
    <div class="grp-head">
      <div class="grp-title">🇺🇸 美股 USD</div>
      <div class="grp-sum" id="gsUs"></div>
    </div>
    <div class="accs">
      <div class="acc">
        <div class="acc-name">元大美股 2</div>
        <div class="inp-wrap"><span class="inp-pfx">$</span><input type="number" id="a_y2" placeholder="0.00" step="0.01" min="0"></div>
        <div class="acc-conv" id="c_y2"></div>
      </div>
      <div class="acc">
        <div class="acc-name">元大美股 3</div>
        <div class="inp-wrap"><span class="inp-pfx">$</span><input type="number" id="a_y3" placeholder="0.00" step="0.01" min="0"></div>
        <div class="acc-conv" id="c_y3"></div>
      </div>
      <div class="acc">
        <div class="acc-name">eToro</div>
        <div class="inp-wrap"><span class="inp-pfx">$</span><input type="number" id="a_et" placeholder="0.00" step="0.01" min="0"></div>
        <div class="acc-conv" id="c_et"></div>
      </div>
    </div>
  </div>

  <!-- TW STOCKS -->
  <div class="grp">
    <div class="grp-head">
      <div class="grp-title">🇹🇼 台股 TWD</div>
      <div class="grp-sum" id="gsTw"></div>
    </div>
    <div class="accs">
      <div class="acc">
        <div class="acc-name">元大台股</div>
        <div class="inp-wrap">
          <span class="inp-pfx pfx-ntd">NT$</span>
          <input type="number" id="a_yt" placeholder="0" step="1" min="0" class="ntd-pfx">
        </div>
      </div>
      <div class="acc">
        <div class="acc-name">永豐台股</div>
        <div class="inp-wrap">
          <span class="inp-pfx pfx-ntd">NT$</span>
          <input type="number" id="a_sp" placeholder="0" step="1" min="0" class="ntd-pfx">
        </div>
      </div>
    </div>
  </div>

  <!-- CASH -->
  <div class="grp">
    <div class="grp-head">
      <div class="grp-title">💰 現金 / 活存 TWD</div>
    </div>
    <div class="accs" style="grid-template-columns:minmax(180px,260px)">
      <div class="acc">
        <div class="acc-name">現金</div>
        <div class="inp-wrap">
          <span class="inp-pfx pfx-ntd">NT$</span>
          <input type="number" id="a_ca" placeholder="0" step="1" min="0" class="ntd-pfx">
        </div>
      </div>
    </div>
  </div>

  <!-- RECORD BUTTON -->
  <button class="rec-btn" onclick="recordToday()"><span>▶ &nbsp;RECORD TODAY</span></button>

  <!-- CHART -->
  <div class="chart-card">
    <div class="sec-title">Trend</div>
    <div class="chart-box">
      <div class="chart-empty" id="chartEmpty">— 需要至少 2 筆紀錄才能顯示趨勢 —</div>
      <canvas id="trendChart" style="display:none"></canvas>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="sec-title">History</div>
  <div id="histBox"><div class="hist-empty">尚無歷史紀錄</div></div>

</div><!-- .wrap -->

<div class="toast" id="toast"></div>

<script>
/* ── PIN 保護 ───────────────────────────────────── */
(function() {
  if (sessionStorage.getItem('at_unlocked') === '1') {
    document.getElementById('pin-screen').style.display = 'none';
  } else {
    document.body.style.overflow = 'hidden';
  }
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
})();

function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === '3035') {
    sessionStorage.setItem('at_unlocked', '1');
    document.getElementById('pin-screen').style.display = 'none';
    document.body.style.overflow = '';
  } else {
    document.getElementById('pin-error').textContent = '密碼錯誤，請再試一次';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}

function logout() {
  sessionStorage.removeItem('at_unlocked');
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-screen').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
}

const KEY = 'nomo_asset_v2';
let trendChart = null;
let ringChart = null;

/* ─── Storage ───────────────────────────────────── */
function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
}
function save(recs) {
  localStorage.setItem(KEY, JSON.stringify(recs));
}

/* ─── Helpers ───────────────────────────────────── */
function v(id) { return parseFloat(document.getElementById(id).value) || 0; }

function fmtNTD(n) {
  if (!n && n !== 0) return '—';
  return 'NT$ ' + Math.round(n).toLocaleString('zh-TW');
}
function fmtShort(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e8) return 'NT$ ' + (n/1e8).toFixed(2) + ' 億';
  if (n >= 1e4) return 'NT$ ' + (n/1e4).toFixed(1) + ' 萬';
  return 'NT$ ' + Math.round(n).toLocaleString();
}
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ─── Calculate ─────────────────────────────────── */
function calc() {
  const rate    = v('rate') || 32.5;
  const y2      = v('a_y2');
  const y3      = v('a_y3');
  const et      = v('a_et');
  const yt      = v('a_yt');
  const sp      = v('a_sp');
  const ca      = v('a_ca');
  const usd     = y2 + y3 + et;
  const usTWD   = usd * rate;
  const twStock = yt + sp;
  const total   = usTWD + twStock + ca;
  return { rate, y2, y3, et, yt, sp, ca, usd, usTWD, twStock, ca, total };
}

/* ─── Update UI ─────────────────────────────────── */
function updateUI() {
  const t = calc();
  const recs = load();

  /* hero total */
  document.getElementById('heroTotal').textContent = t.total > 0 ? fmtNTD(t.total) : 'NT$ —';

  /* hero change vs last record */
  const hc = document.getElementById('heroChange');
  if (recs.length > 0 && t.total > 0) {
    const last = recs[recs.length - 1].totals.total;
    const diff = t.total - last;
    const pct  = ((diff / last) * 100).toFixed(2);
    const sign = diff >= 0 ? '+' : '';
    hc.textContent = `${sign}${fmtNTD(diff)} (${sign}${pct}%) vs last record`;
    hc.className = 'hero-change ' + (diff >= 0 ? 'pos' : 'neg');
  } else {
    hc.textContent = '';
    hc.className = 'hero-change';
  }

  /* breakdown */
  document.getElementById('bdUs').textContent   = t.usTWD   > 0 ? fmtShort(t.usTWD)   : '—';
  document.getElementById('bdUsSub').textContent = t.usd    > 0 ? `$ ${t.usd.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})} USD` : '';
  document.getElementById('bdTw').textContent    = t.twStock > 0 ? fmtShort(t.twStock)  : '—';
  document.getElementById('bdCash').textContent  = t.ca      > 0 ? fmtShort(t.ca)       : '—';

  /* group sums */
  document.getElementById('gsUs').textContent = t.usTWD   > 0 ? fmtShort(t.usTWD)   : '';
  document.getElementById('gsTw').textContent = t.twStock > 0 ? fmtShort(t.twStock)  : '';

  /* individual conversions */
  const rate = t.rate;
  [['a_y2','c_y2'],['a_y3','c_y3'],['a_et','c_et']].forEach(([id,cid]) => {
    const usd = v(id);
    document.getElementById(cid).textContent = usd > 0 ? `≈ ${fmtShort(usd * rate)}` : '';
  });

  /* allocation ring */
  updateRing(t);
}

/* ─── Allocation Donut ──────────────────────────── */
function updateRing(t) {
  const total = t.total;
  const wrap = document.getElementById('allocWrap');
  if (total <= 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';

  const data   = [t.usTWD, t.twStock, t.ca];
  const colors = ['#00e5ff','#10b981','#f59e0b'];
  const names  = ['美股','台股','現金'];
  const canvas = document.getElementById('ringCanvas');
  const ctx    = canvas.getContext('2d');

  if (ringChart) ringChart.destroy();
  ringChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: 0,
        borderRadius: 3,
        hoverOffset: 4
      }]
    },
    options: {
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 400 }
    }
  });

  const leg = document.getElementById('allocLegend');
  leg.innerHTML = names.map((n, i) => {
    const pct = total > 0 ? ((data[i]/total)*100).toFixed(1) : '0.0';
    return `<div class="al-item">
      <span class="al-dot" style="background:${colors[i]}"></span>
      <span class="al-name">${n}</span>
      <span class="al-pct">${pct}%</span>
      <span class="al-amt">${fmtShort(data[i])}</span>
    </div>`;
  }).join('');
}

/* ─── Record ────────────────────────────────────── */
function recordToday() {
  const t = calc();
  if (t.total === 0) { showToast('⚠  請先輸入至少一個帳戶數值'); return; }

  const date = today();
  const recs = load();
  const rec = {
    date,
    exchangeRate: t.rate,
    accounts: { y2: t.y2, y3: t.y3, et: t.et, yt: t.yt, sp: t.sp, ca: t.ca },
    totals:   { usTWD: t.usTWD, usd: t.usd, twStock: t.twStock, cash: t.ca, total: t.total }
  };

  const idx = recs.findIndex(r => r.date === date);
  if (idx >= 0) {
    if (!confirm(`${date} 已有紀錄，覆蓋？`)) return;
    recs[idx] = rec;
  } else {
    recs.push(rec);
  }

  recs.sort((a,b) => a.date.localeCompare(b.date));
  save(recs);
  renderChart(recs);
  renderHistory(recs);
  showToast('✓  RECORDED — ' + date);
}

/* ─── Delete ────────────────────────────────────── */
function del(date) {
  if (!confirm(`刪除 ${date}？`)) return;
  const recs = load().filter(r => r.date !== date);
  save(recs);
  renderChart(recs);
  renderHistory(recs);
  updateUI();
  showToast('✓  DELETED — ' + date);
}

/* ─── Chart ─────────────────────────────────────── */
function renderChart(recs) {
  const canvas = document.getElementById('trendChart');
  const empty  = document.getElementById('chartEmpty');

  if (recs.length < 2) {
    canvas.style.display = 'none';
    empty.style.display  = 'flex';
    if (trendChart) { trendChart.destroy(); trendChart = null; }
    return;
  }

  canvas.style.display = 'block';
  empty.style.display  = 'none';

  const labels = recs.map(r => r.date.slice(5));
  const totals = recs.map(r => r.totals.total);
  const usData = recs.map(r => r.totals.usTWD);
  const twData = recs.map(r => r.totals.twStock);
  const caData = recs.map(r => r.totals.cash);

  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 250);
  grad.addColorStop(0, 'rgba(0,229,255,0.22)');
  grad.addColorStop(1, 'rgba(0,229,255,0)');

  if (trendChart) trendChart.destroy();

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '總資產',
          data: totals,
          borderColor: '#00e5ff',
          backgroundColor: grad,
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: '#00e5ff',
          pointBorderColor: '#07080f',
          pointBorderWidth: 2,
          fill: true,
          tension: 0.35,
          order: 0
        },
        {
          label: '美股',
          data: usData,
          borderColor: '#8b5cf6',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 3,
          pointBackgroundColor: '#8b5cf6',
          pointBorderColor: '#07080f',
          pointBorderWidth: 1.5,
          borderDash: [5, 4],
          fill: false,
          tension: 0.35,
          order: 1
        },
        {
          label: '台股',
          data: twData,
          borderColor: '#10b981',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 3,
          pointBackgroundColor: '#10b981',
          pointBorderColor: '#07080f',
          pointBorderWidth: 1.5,
          borderDash: [5, 4],
          fill: false,
          tension: 0.35,
          order: 2
        },
        {
          label: '現金',
          data: caData,
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 3,
          pointBackgroundColor: '#f59e0b',
          pointBorderColor: '#07080f',
          pointBorderWidth: 1.5,
          borderDash: [5, 4],
          fill: false,
          tension: 0.35,
          order: 3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          align: 'end',
          labels: {
            color: '#64748b',
            font: { family: "'JetBrains Mono', monospace", size: 10 },
            boxWidth: 24,
            usePointStyle: true,
            pointStyleWidth: 16,
            padding: 14,
          }
        },
        tooltip: {
          backgroundColor: '#0c0e1a',
          borderColor: 'rgba(0,229,255,0.25)',
          borderWidth: 1,
          titleColor: '#64748b',
          bodyColor: '#f1f5f9',
          titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
          padding: 14,
          callbacks: {
            label: c => `  ${c.dataset.label}: ${fmtNTD(c.parsed.y)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#64748b', font: { family: "'JetBrains Mono', monospace", size: 10 } },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#64748b',
            font: { family: "'JetBrains Mono', monospace", size: 10 },
            callback: n => {
              if (n >= 1e8) return (n/1e8).toFixed(1) + '億';
              if (n >= 1e4) return (n/1e4).toFixed(0) + '萬';
              return n.toLocaleString();
            }
          },
          border: { color: 'rgba(255,255,255,0.06)' }
        }
      }
    }
  });
}

/* ─── History Table ─────────────────────────────── */
function renderHistory(recs) {
  const box = document.getElementById('histBox');
  if (recs.length === 0) {
    box.innerHTML = '<div class="hist-empty">尚無歷史紀錄</div>';
    return;
  }

  const rows = [...recs].reverse().slice(0, 30);
  let html = `<table class="htbl">
    <thead><tr>
      <th>Date</th>
      <th>美股 (TWD)</th>
      <th>台股</th>
      <th>現金</th>
      <th>Total</th>
      <th>Change</th>
      <th></th>
    </tr></thead><tbody>`;

  rows.forEach((r, i) => {
    const prevIdx = recs.length - 1 - i - 1;
    let chgHtml = `<span style="color:var(--text-muted)">—</span>`;
    if (prevIdx >= 0) {
      const prev = recs[prevIdx];
      const diff = r.totals.total - prev.totals.total;
      const pct  = ((diff / prev.totals.total) * 100).toFixed(2);
      const sign = diff >= 0 ? '+' : '';
      const cls  = diff >= 0 ? 'pos' : 'neg';
      chgHtml = `<span class="td-chg ${cls}">${sign}${pct}%</span>`;
    }
    html += `<tr>
      <td>${r.date}</td>
      <td>${fmtShort(r.totals.usTWD)}</td>
      <td>${fmtShort(r.totals.twStock)}</td>
      <td>${fmtShort(r.totals.cash)}</td>
      <td class="td-tot">${fmtNTD(r.totals.total)}</td>
      <td>${chgHtml}</td>
      <td><button class="del-btn" onclick="del('${r.date}')">✕</button></td>
    </tr>`;
  });

  html += '</tbody></table>';
  box.innerHTML = html;
}

/* ─── Toast ─────────────────────────────────────── */
function showToast(msg, ms = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

/* ─── Fill from record ───────────────────────────── */
function fill(rec) {
  const a = rec.accounts;
  document.getElementById('rate').value  = rec.exchangeRate || 32.5;
  document.getElementById('a_y2').value  = a.y2 || '';
  document.getElementById('a_y3').value  = a.y3 || '';
  document.getElementById('a_et').value  = a.et || '';
  document.getElementById('a_yt').value  = a.yt || '';
  document.getElementById('a_sp').value  = a.sp || '';
  document.getElementById('a_ca').value  = a.ca || '';
}

/* ─── Init ───────────────────────────────────────── */
function init() {
  /* header date */
  const now = new Date();
  const weekdays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('hdate').textContent =
    `${today()} ${weekdays[now.getDay()]}`;

  /* pre-fill inputs from last/today record */
  const recs = load();
  if (recs.length > 0) {
    const todayRec = recs.find(r => r.date === today());
    fill(todayRec || recs[recs.length - 1]);
  }

  updateUI();
  renderChart(recs);
  renderHistory(recs);

  /* live update on input */
  ['rate','a_y2','a_y3','a_et','a_yt','a_sp','a_ca'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateUI);
  });
}

init();
</script>
